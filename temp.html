<section class="container py-5">
    <div class="row g-4 align-items-start">

        <!-- Panel de búsqueda -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-lg rounded-4 h-100">
                <div class="card-body p-4">

                    <h2 class="fw-bold mb-4">
                        Busque libros y objetos de colección
                    </h2>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Autor</label>
                        <input type="text"
                               class="form-control"
                               placeholder="Ingrese el autor">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Título</label>
                        <input type="text"
                               class="form-control"
                               placeholder="Ingrese el título">
                    </div>

                    <button class="btn btn-info text-white rounded-pill px-4">
                        <i class="bi bi-search"></i> Buscar
                    </button>

                </div>
            </div>
        </div>

        <!-- Carrusel -->
        <div class="col-lg-8">

            <div id="carouselExampleInterval"
                 class="carousel slide rounded-4 overflow-hidden shadow"
                 data-bs-ride="carousel">

                <div class="carousel-inner">

                    <div class="carousel-item active" data-bs-interval="3000">
                        <img src="images/portada1.jpg"
                             class="d-block w-100"
                             alt="Portada 1">
                    </div>

                    <div class="carousel-item" data-bs-interval="3000">
                        <img src="images/portada2.jpg"
                             class="d-block w-100"
                             alt="Portada 2">
                    </div>

                    <div class="carousel-item" data-bs-interval="3000">
                        <img src="images/portada3.jpg"
                             class="d-block w-100"
                             alt="Portada 3">
                    </div>

                </div>
            </div>

            <!-- Card + Botón -->
            <div class="d-flex justify-content-between align-items-center mt-4 gap-3">

                <div class="card border-0 shadow rounded-4 flex-grow-1">
                    <div class="card-body p-4">

                        <h3 class="fw-bold">
                            40 libros ilustrados influyentes
                        </h3>

                        <p class="text-muted mb-0">
                            Descubre el punto de encuentro entre las palabras y el arte.
                            Desde obras maestras botánicas hasta entrañables libros ilustrados,
                            explora obras ilustradas de artistas de renombre mundial y
                            pioneros de la Edad de Oro.
                        </p>

                    </div>
                </div>

                <!-- Botón al lado -->
                <button class="btn btn-primary rounded-pill px-4 py-3">
                    Ver más →
                </button>

            </div>

        </div>

    </div>
</section>
